models:
  - densenet121
  - resnet18
  - efficientnet_b0
  - mobilenet_v2

threshold: 0.3
epochs: 10
batch_size: 32
learning_rate: 0.001
image_size: 224

data_dir: data/chest_xray
seed: 42
num_workers: 4
checkpoint_dir: checkpoints
results_dir: results
weight_decay: 0.0001
lr_step_size: 5
lr_gamma: 0.1
early_stopping_patience: 3
